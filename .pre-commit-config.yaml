repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-json
      - id: check-yaml

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock.json

  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        language: system
        entry: npx eslint
        types: [file]
        files: \.(ts|tsx)$
        pass_filenames: true

      - id: knip
        name: Knip (dead code check)
        language: system
        entry: npx knip
        pass_filenames: false
        stages: [pre-push]

      - id: npm-audit
        name: npm audit (dependency vulnerability check)
        language: system
        entry: npm audit --audit-level=high
        pass_filenames: false
        stages: [pre-push]
