stages:
  - audit
  - lint
  - test
  - build
  - changelog

default:
  image: node:20-alpine
  before_script:
    - npm ci --prefer-offline

dependency-audit:
  stage: audit
  script:
    - npm audit --audit-level=high
  allow_failure: false

lint:
  stage: lint
  script:
    - npm run lint
    - npm run knip

test-coverage:
  stage: test
  script:
    - npm run test:coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 7 days

build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - .next/
    expire_in: 1 hour

generate-changelog:
  stage: changelog
  image: orhunp/git-cliff:latest
  before_script: []
  script:
    - git-cliff --config cliff.toml --output CHANGELOG.md
  artifacts:
    paths:
      - CHANGELOG.md
    expire_in: 7 days
  only:
    - tags
